<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Portal | Feature Flag System</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; display: flex; flex-direction: column; }
    header { background: #0f3460; color: #fff; padding: 14px 28px; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 1rem; font-weight: 600; }
    .org-pill { background: rgba(255,255,255,0.15); padding: 3px 12px; border-radius: 20px; font-size: 0.78rem; margin-left: 10px; }
    #logout-btn { background: #e74c3c; color: #fff; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 0.82rem; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px 16px; }
    .card { background: #fff; border-radius: 12px; padding: 32px; box-shadow: 0 4px 20px rgba(0,0,0,0.09); width: 100%; max-width: 460px; }
    h2 { font-size: 1.15rem; margin-bottom: 4px; }
    .subtitle { font-size: 0.83rem; color: #999; margin-bottom: 24px; }
    label { display: block; font-size: 0.82rem; font-weight: 500; margin-bottom: 5px; color: #555; }
    input, select { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem; outline: none; background: #fff; transition: border-color 0.2s; }
    input:focus, select:focus { border-color: #0f3460; }
    .form-group { margin-bottom: 16px; }
    button.btn { width: 100%; background: #0f3460; color: #fff; border: none; padding: 11px; border-radius: 6px; cursor: pointer; font-size: 0.95rem; font-weight: 600; transition: opacity 0.2s; }
    button.btn:hover { opacity: 0.88; }
    .tabs { display: flex; border-bottom: 2px solid #eee; margin-bottom: 22px; }
    .tab { padding: 7px 18px; cursor: pointer; font-weight: 600; font-size: 0.88rem; border-bottom: 2px solid transparent; margin-bottom: -2px; color: #aaa; }
    .tab.active { color: #0f3460; border-color: #0f3460; }
    .msg { margin-top: 10px; font-size: 0.83rem; padding: 7px 11px; border-radius: 6px; }
    .msg.success { background: #d4edda; color: #155724; }
    .msg.error   { background: #f8d7da; color: #721c24; }
    .result { margin-top: 20px; padding: 20px; border-radius: 10px; text-align: center; }
    .result.enabled  { background: #d4edda; border: 1px solid #c3e6cb; }
    .result.disabled { background: #fde8e8; border: 1px solid #f5c6cb; }
    .result.notfound { background: #fff3cd; border: 1px solid #ffeeba; }
    .result-icon   { font-size: 2rem; margin-bottom: 8px; }
    .result-status { font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; }
    .result.enabled  .result-status { color: #155724; }
    .result.disabled .result-status { color: #721c24; }
    .result.notfound .result-status { color: #856404; }
    .result-detail { font-size: 0.83rem; color: #555; }
    .key-tag { font-family: monospace; background: rgba(0,0,0,0.06); padding: 1px 7px; border-radius: 4px; }
    .divider { border: none; border-top: 1px solid #eee; margin: 18px 0; }
    #app { display: none; }
    #auth-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  </style>
</head>
<body>

<!-- Auth Screen -->
<div id="auth-screen">
  <div class="card">
    <div class="tabs">
      <div class="tab active" id="tab-login" onclick="switchTab('login')">Login</div>
      <div class="tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</div>
    </div>

    <div id="form-login">
      <div class="form-group"><label>Email</label><input type="email" id="l-email" placeholder="user@example.com" /></div>
      <div class="form-group"><label>Password</label><input type="password" id="l-pass" placeholder="••••••••" /></div>
      <button class="btn" onclick="login()">Login</button>
      <div id="login-msg"></div>
    </div>

    <div id="form-signup" style="display:none">
      <div class="form-group">
        <label>Organization</label>
        <select id="s-org"><option value="">Loading...</option></select>
      </div>
      <div class="form-group"><label>Email</label><input type="email" id="s-email" placeholder="user@example.com" /></div>
      <div class="form-group"><label>Password</label><input type="password" id="s-pass" placeholder="Min 6 characters" /></div>
      <button class="btn" onclick="signup()">Create Account</button>
      <div id="signup-msg"></div>
    </div>
  </div>
</div>

<!-- App Screen -->
<div id="app">
  <header>
    <h1>User Portal <span class="org-pill" id="org-label">—</span></h1>
    <button id="logout-btn" onclick="logout()">Logout</button>
  </header>
  <main>
    <div class="card">
      <h2>Check Feature Status</h2>
      <p class="subtitle">Enter a feature key to see if it's enabled for your organization.</p>

      <div class="form-group">
        <label>Feature Key</label>
        <input type="text" id="feature-key" placeholder="e.g. dark_mode" />
      </div>

      <button class="btn" onclick="checkFlag()">Check Feature</button>

      <div id="result-box"></div>
    </div>
  </main>
</div>

<script>
  const API = 'http://localhost:4000/api';
  let token  = localStorage.getItem('user_token');
  let orgId  = localStorage.getItem('user_org_id');
  let orgName = localStorage.getItem('user_org_name');

  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.className = 'msg ' + type;
    el.textContent = text;
    setTimeout(() => { el.textContent = ''; el.className = ''; }, 4000);
  }

  async function apiFetch(path, opts = {}) {
    const headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = 'Bearer ' + token;
    const res = await fetch(API + path, { headers, ...opts });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Request failed');
    return data;
  }

  function switchTab(tab) {
    document.getElementById('form-login').style.display  = tab === 'login'  ? 'block' : 'none';
    document.getElementById('form-signup').style.display = tab === 'signup' ? 'block' : 'none';
    document.getElementById('tab-login').className  = 'tab' + (tab === 'login'  ? ' active' : '');
    document.getElementById('tab-signup').className = 'tab' + (tab === 'signup' ? ' active' : '');
  }

  async function loadOrgsForSignup() {
    try {
      const orgs = await fetch(`${API}/user/organizations`).then(r => r.json());
      const sel = document.getElementById('s-org');
      sel.innerHTML = orgs.length
        ? orgs.map(o => `<option value="${o.id}">${o.name}</option>`).join('')
        : '<option value="">No organizations available</option>';
    } catch {}
  }

  async function login() {
    const email    = document.getElementById('l-email').value.trim();
    const password = document.getElementById('l-pass').value;
    try {
      const data = await apiFetch('/user/login', { method: 'POST', body: JSON.stringify({ email, password }) });
      token   = data.token;
      orgId   = data.org_id;
      orgName = data.org_name;
      localStorage.setItem('user_token',    token);
      localStorage.setItem('user_org_id',   orgId);
      localStorage.setItem('user_org_name', orgName);
      showApp();
    } catch (e) { showMsg('login-msg', e.message, 'error'); }
  }

  async function signup() {
    const org_id   = parseInt(document.getElementById('s-org').value);
    const email    = document.getElementById('s-email').value.trim();
    const password = document.getElementById('s-pass').value;
    if (!org_id)          return showMsg('signup-msg', 'Select an organization', 'error');
    if (!email)           return showMsg('signup-msg', 'Email is required', 'error');
    if (password.length < 6) return showMsg('signup-msg', 'Password must be at least 6 characters', 'error');
    try {
      await apiFetch('/user/signup', { method: 'POST', body: JSON.stringify({ email, password, org_id }) });
      showMsg('signup-msg', 'Account created! Please log in.', 'success');
      setTimeout(() => switchTab('login'), 1500);
    } catch (e) { showMsg('signup-msg', e.message, 'error'); }
  }

  function logout() {
    token = null; orgId = null; orgName = null;
    localStorage.removeItem('user_token');
    localStorage.removeItem('user_org_id');
    localStorage.removeItem('user_org_name');
    document.getElementById('app').style.display = 'none';
    document.getElementById('result-box').innerHTML = '';
    document.getElementById('auth-screen').style.display = 'flex';
  }

  function showApp() {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('org-label').textContent = orgName || `Org #${orgId}`;
  }

  async function checkFlag() {
    const feature_key = document.getElementById('feature-key').value.trim();
    const box = document.getElementById('result-box');

    if (!feature_key) {
      box.innerHTML = '<div class="result notfound"><div class="result-icon">⚠️</div><div class="result-status">Enter a Feature Key</div><div class="result-detail">Type a feature key to check its status.</div></div>';
      return;
    }

    box.innerHTML = '<p style="text-align:center;color:#999;margin-top:16px;font-size:0.88rem">Checking...</p>';

    try {
      const data = await apiFetch('/user/check-flag', {
        method: 'POST',
        body: JSON.stringify({ feature_key })
      });

      if (data.enabled) {
        box.innerHTML = `
          <div class="result enabled">
            <div class="result-icon">✅</div>
            <div class="result-status">Feature Enabled</div>
            <div class="result-detail"><span class="key-tag">${data.feature_key}</span> is <strong>enabled</strong> for <strong>${data.org}</strong></div>
          </div>`;
      } else {
        box.innerHTML = `
          <div class="result disabled">
            <div class="result-icon">❌</div>
            <div class="result-status">Feature Disabled</div>
            <div class="result-detail"><span class="key-tag">${data.feature_key}</span> is <strong>disabled</strong> for <strong>${data.org}</strong></div>
          </div>`;
      }
    } catch (e) {
      box.innerHTML = `
        <div class="result notfound">
          <div class="result-icon">⚠️</div>
          <div class="result-status">Not Found</div>
          <div class="result-detail">${e.message}</div>
        </div>`;
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') checkFlag(); });

  loadOrgsForSignup();
  if (token && orgId) showApp();
</script>
</body>
</html>
