<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Super Admin | Feature Flag System</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; }
    header { background: #1a1a2e; color: #fff; padding: 14px 28px; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 1rem; font-weight: 600; letter-spacing: 0.3px; }
    header span { font-size: 0.8rem; opacity: 0.6; margin-left: 10px; }
    #logout-btn { background: #e74c3c; color: #fff; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 0.82rem; }
    .container { max-width: 900px; margin: 32px auto; padding: 0 16px; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
    .stat-card { background: #fff; border-radius: 10px; padding: 18px 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
    .stat-card .num { font-size: 1.8rem; font-weight: 700; color: #1a1a2e; }
    .stat-card .lbl { font-size: 0.78rem; color: #888; margin-top: 3px; }
    .card { background: #fff; border-radius: 10px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); margin-bottom: 20px; }
    h2 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; color: #1a1a2e; }
    label { display: block; font-size: 0.82rem; font-weight: 500; margin-bottom: 5px; color: #555; }
    input { width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: #1a1a2e; }
    .form-group { margin-bottom: 14px; }
    .row { display: flex; gap: 12px; align-items: flex-end; }
    .row .form-group { flex: 1; margin-bottom: 0; }
    button.btn { background: #1a1a2e; color: #fff; border: none; padding: 9px 20px; border-radius: 6px; cursor: pointer; font-size: 0.88rem; font-weight: 500; white-space: nowrap; }
    button.btn:hover { opacity: 0.88; }
    .msg { margin-top: 10px; font-size: 0.83rem; padding: 7px 11px; border-radius: 6px; }
    .msg.success { background: #d4edda; color: #155724; }
    .msg.error   { background: #f8d7da; color: #721c24; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #f0f0f0; font-size: 0.87rem; }
    th { background: #fafafa; font-weight: 600; color: #555; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.5px; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }
    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .badge.id  { background: #e8f0fe; color: #1a73e8; }
    .badge.cnt { background: #f0f0f0; color: #555; }
    .empty { color: #bbb; font-size: 0.88rem; text-align: center; padding: 28px 0; }
    #app { display: none; }
    #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { background: #fff; border-radius: 12px; padding: 36px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); width: 100%; max-width: 360px; }
    .login-card h2 { margin-bottom: 4px; font-size: 1.2rem; }
    .login-card p { font-size: 0.82rem; color: #999; margin-bottom: 24px; }
    .login-card button { width: 100%; }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h2>Super Admin</h2>
    <p>Feature Flag Management System</p>
    <div class="form-group"><label>Email</label><input type="email" id="l-email" placeholder="superadmin@flagsystem.com" /></div>
    <div class="form-group"><label>Password</label><input type="password" id="l-pass" placeholder="••••••••" /></div>
    <button class="btn" onclick="login()">Login</button>
    <div id="login-msg"></div>
  </div>
</div>

<div id="app">
  <header>
    <h1>Super Admin Dashboard <span>Feature Flag System</span></h1>
    <button id="logout-btn" onclick="logout()">Logout</button>
  </header>
  <div class="container">

    <div class="stats-row" id="stats-row">
      <div class="stat-card"><div class="num" id="s-orgs">—</div><div class="lbl">Organizations</div></div>
      <div class="stat-card"><div class="num" id="s-admins">—</div><div class="lbl">Org Admins</div></div>
      <div class="stat-card"><div class="num" id="s-users">—</div><div class="lbl">End Users</div></div>
      <div class="stat-card"><div class="num" id="s-flags">—</div><div class="lbl">Feature Flags</div></div>
    </div>

    <div class="card">
      <h2>Create Organization</h2>
      <div class="row">
        <div class="form-group"><label>Organization Name</label><input type="text" id="org-name" placeholder="e.g. Acme Corp" /></div>
        <button class="btn" onclick="createOrg()">Create</button>
      </div>
      <div id="org-msg"></div>
    </div>

    <div class="card">
      <h2>Organizations</h2>
      <div id="org-list"><p class="empty">Loading...</p></div>
    </div>

  </div>
</div>

<script>
  const API = 'http://localhost:4000/api';
  let token = localStorage.getItem('sa_token');

  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.className = 'msg ' + type;
    el.textContent = text;
    setTimeout(() => { el.textContent = ''; el.className = ''; }, 4000);
  }

  async function apiFetch(path, opts = {}) {
    const headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = 'Bearer ' + token;
    const res = await fetch(API + path, { headers, ...opts });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Request failed');
    return data;
  }

  async function login() {
    const email = document.getElementById('l-email').value.trim();
    const password = document.getElementById('l-pass').value;
    try {
      const data = await apiFetch('/super-admin/login', { method: 'POST', body: JSON.stringify({ email, password }) });
      token = data.token;
      localStorage.setItem('sa_token', token);
      showApp();
    } catch (e) { showMsg('login-msg', e.message, 'error'); }
  }

  function logout() {
    token = null;
    localStorage.removeItem('sa_token');
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  }

  async function showApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadStats();
    loadOrgs();
  }

  async function loadStats() {
    try {
      const s = await apiFetch('/super-admin/stats');
      document.getElementById('s-orgs').textContent   = s.orgs;
      document.getElementById('s-admins').textContent = s.admins;
      document.getElementById('s-users').textContent  = s.users;
      document.getElementById('s-flags').textContent  = s.flags;
    } catch {}
  }

  async function createOrg() {
    const name = document.getElementById('org-name').value.trim();
    if (!name) return showMsg('org-msg', 'Organization name is required', 'error');
    try {
      await apiFetch('/super-admin/organizations', { method: 'POST', body: JSON.stringify({ name }) });
      document.getElementById('org-name').value = '';
      showMsg('org-msg', `"${name}" created successfully`, 'success');
      loadStats();
      loadOrgs();
    } catch (e) { showMsg('org-msg', e.message, 'error'); }
  }

  async function loadOrgs() {
    try {
      const orgs = await apiFetch('/super-admin/organizations');
      const el = document.getElementById('org-list');
      if (!orgs.length) { el.innerHTML = '<p class="empty">No organizations yet.</p>'; return; }
      el.innerHTML = `
        <table>
          <thead><tr><th>ID</th><th>Name</th><th>Admins</th><th>Users</th><th>Flags</th><th>Created</th></tr></thead>
          <tbody>
            ${orgs.map(o => `
              <tr>
                <td><span class="badge id">#${o.id}</span></td>
                <td><strong>${o.name}</strong></td>
                <td><span class="badge cnt">${o.admin_count}</span></td>
                <td><span class="badge cnt">${o.user_count}</span></td>
                <td><span class="badge cnt">${o.flag_count}</span></td>
                <td style="color:#999">${new Date(o.created_at + ' UTC').toLocaleDateString()}</td>
              </tr>`).join('')}
          </tbody>
        </table>`;
    } catch { document.getElementById('org-list').innerHTML = '<p class="empty">Failed to load.</p>'; }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') login();
  });

  if (token) showApp();
</script>
</body>
</html>
